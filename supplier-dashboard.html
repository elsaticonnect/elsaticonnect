<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Supplier Dashboard | Elsati Connect</title>
  <meta name="description" content="Supplier dashboard for Elsati Connect.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">

  <style>
    .supplier-kpi-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(160px, 1fr));
      gap: 18px;
      margin: 28px 0;
    }

    .supplier-kpi-card,
    .verification-panel {
      background: #ffffff;
      border-radius: 24px;
      padding: 22px;
      box-shadow: 0 20px 50px rgba(15, 23, 42, 0.08);
      border: 1px solid rgba(15, 23, 42, 0.06);
    }

    .supplier-kpi-card span {
      color: #64748b;
      font-weight: 700;
      font-size: 14px;
    }

    .supplier-kpi-card strong {
      display: block;
      font-size: 34px;
      margin-top: 8px;
      color: #102033;
    }

    .supplier-status-badge {
      display: inline-flex;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      margin-top: 10px;
      background: #dcfce7;
      color: #166534;
    }

    .supplier-dashboard-actions {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .notification-btn {
      border: 1px solid rgba(15, 23, 42, 0.12);
      background: #ffffff;
      border-radius: 999px;
      padding: 12px 16px;
      cursor: pointer;
      font-weight: 800;
    }

    .verification-warning {
      margin-bottom: 18px;
      padding: 16px;
      border-radius: 16px;
      background: #fee2e2;
      color: #991b1b;
      font-weight: 700;
      line-height: 1.6;
    }

    .verification-note {
      margin-top: 12px;
      color: #64748b;
      font-size: 0.94rem;
      line-height: 1.6;
    }

    @media (max-width: 900px) {
      .supplier-kpi-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 600px) {
      .supplier-kpi-grid {
        grid-template-columns: 1fr;
      }

      .supplier-dashboard-actions {
        flex-direction: column;
        align-items: stretch;
      }
    }
  </style>
</head>

<body>
  <div class="site-shell auth-shell">
    <header class="topbar auth-topbar">
      <a class="brand brand-image" href="index.html" aria-label="Elsati Connect home">
        <img src="elsati.png" alt="Elsati Connect logo">
      </a>

      <div class="topbar-actions supplier-dashboard-actions">
        <button class="notification-btn" type="button">🔔 2</button>
        <a class="button button-secondary" href="monitor.html">Background Monitor</a>
        <button class="button button-secondary" id="logout-button" type="button">Log out</button>
      </div>
    </header>

    <main class="dashboard-page reveal">
      <section class="dashboard-intro">
        <p class="eyebrow">Supplier dashboard</p>

        <h1>
          Welcome, <span id="dashboard-user-name">Supplier user</span>.
        </h1>

        <p class="auth-copy">
          Your supplier profile
          <strong id="dashboard-company-name">Company</strong>
          can review RFQs, submit quotations, and track award status once verified.
        </p>
      </section>

      <section class="supplier-kpi-grid">
        <article class="supplier-kpi-card">
          <span>Open RFQs</span>
          <strong id="supplier-open-rfq-count">0</strong>
        </article>

        <article class="supplier-kpi-card">
          <span>Submitted Quotes</span>
          <strong>0</strong>
        </article>

        <article class="supplier-kpi-card">
          <span>Won Orders</span>
          <strong>0</strong>
        </article>

        <article class="supplier-kpi-card">
          <span>Response Rate</span>
          <strong>0%</strong>
        </article>
      </section>

      <section class="verification-panel">
        <div class="panel-head">
          <h2>Supplier Verification</h2
